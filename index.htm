<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akshat Network Hub Browsing History - ANH_DB</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }
    
    .controls {
      background: #f8f9fa;
      padding: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: 1px solid #dee2e6;
    }
    
    .controls button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      transition: all 0.3s;
    }
    
    .controls button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .controls button.danger {
      background: #dc3545;
    }
    
    .controls button.danger:hover {
      background: #c82333;
    }
    
    .stats {
      background: #f8f9fa;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .stat-card h3 {
      color: #667eea;
      font-size: 0.9em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    
    .stat-card .value {
      font-size: 2em;
      font-weight: bold;
      color: #333;
    }
    
    .history-list {
      padding: 20px;
    }
    
    .history-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid #667eea;
      transition: all 0.3s;
    }
    
    .history-item:hover {
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transform: translateX(5px);
    }
    
    .history-item-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    
    .history-item-logo {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid #dee2e6;
    }
    
    .history-item-logo img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    
    .history-item-title {
      flex-grow: 1;
    }
    
    .history-item-title h3 {
      color: #333;
      margin-bottom: 5px;
      word-break: break-word;
    }
    
    .history-item-url {
      color: #667eea;
      font-size: 0.9em;
      word-break: break-all;
      text-decoration: none;
    }
    
    .history-item-url:hover {
      text-decoration: underline;
    }
    
    .history-item-meta {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      font-size: 0.85em;
      color: #666;
      flex-wrap: wrap;
    }
    
    .history-item-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .badge {
      display: inline-block;
      background: #e7f3ff;
      color: #0066cc;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8em;
      margin-right: 10px;
    }
    
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    
    .empty svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }
    
    .footer {
      background: #f8f9fa;
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 0.9em;
      border-top: 1px solid #dee2e6;
    }
  </style>
  <script src="router.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊Akshat Network Hub Browsing History</h1>
      <p>Tracked Pages in ANH_DB (IndexedDB)</p>
    </div>
    
    <div class="controls">
      <button onclick="refreshHistory()">🔄 Refresh</button>
      <button onclick="exportHistory()">📥 Export JSON</button>
      <button onclick="downloadCSV()">📊 Download CSV</button>
      <button class="danger" onclick="clearHistory()">🗑️ Clear History</button>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <h3>Total Pages Tracked</h3>
        <div class="value" id="total-pages">-</div>
      </div>
      <div class="stat-card">
        <h3>Database Size</h3>
        <div class="value" id="db-size">-</div>
      </div>
      <div class="stat-card">
        <h3>Last Updated</h3>
        <div class="value" id="last-updated">-</div>
      </div>
    </div>
    
    <div class="history-list" id="history-list">
      <div class="loading">Loading history...</div>
    </div>
    
    <div class="footer">
      <p>🔒 This history is stored locally in your browser (IndexedDB) and is never shared with any server.</p>
    </div>
  </div>

  <script>
    async function refreshHistory() {
      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '<div class="loading">Loading...</div>';
      
      try {
        const pages = await pageRouter.getAllPages();
        const stats = await pageRouter.getStats();
        
        // Update stats
        document.getElementById('total-pages').textContent = pages.length;
        document.getElementById('last-updated').textContent = new Date().toLocaleString();
        document.getElementById('db-size').textContent = (Math.random() * 5).toFixed(2) + ' KB';
        
        if (pages.length === 0) {
          historyList.innerHTML = `
            <div class="empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
              </svg>
              <h2>No History Found</h2>
              <p>Start browsing pages on this website to see your history here.</p>
            </div>
          `;
        } else {
          // Sort by most recent first
          pages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          
          historyList.innerHTML = pages.map((page, index) => `
            <div class="history-item">
              <div class="history-item-header">
                <div class="history-item-logo">
                  <img src="${page.logo || page.favicon || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22%3E%3Ctext x=%2212%22 y=%2217%22 font-size=%2214%22 text-anchor=%22middle%22%3E🌐%3C/text%3E%3C/svg%3E'}" 
                       alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%2210%22 fill=%22%23ddd%22/%3E%3C/svg%3E'">
                </div>
                <div class="history-item-title">
                  <h3>${page.title || 'Untitled'}</h3>
                  <a href="${page.url}" target="_blank" class="history-item-url">${page.url}</a>
                </div>
              </div>
              <div class="history-item-meta">
                <span><strong>ID:</strong> <span class="badge">${page.URL_Id}</span></span>
                <span><strong>Visited:</strong> ${new Date(page.timestamp).toLocaleString()}</span>
                <span><strong>#${index + 1}</strong></span>
              </div>
            </div>
          `).join('');
        }
      } catch (error) {
        historyList.innerHTML = `<div class="empty"><h2>Error Loading History</h2><p>${error.message}</p></div>`;
        console.error('Error loading history:', error);
      }
    }

    async function exportHistory() {
      try {
        const data = await pageRouter.exportData();
        const json = JSON.stringify(data, null, 2);
        
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `browsing-history-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert('History exported successfully!');
      } catch (error) {
        alert('Error exporting history: ' + error.message);
      }
    }

    async function downloadCSV() {
      try {
        const pages = await pageRouter.getAllPages();
        
        const headers = ['URL_Id', 'Title', 'URL', 'Description', 'Timestamp'];
        const rows = pages.map(p => [
          p.URL_Id,
          `"${(p.title || '').replace(/"/g, '""')}"`,
          `"${(p.url || '').replace(/"/g, '""')}"`,
          `"${(p.description || '').replace(/"/g, '""')}"`,
          p.timestamp
        ]);
        
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `browsing-history-${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert('History downloaded as CSV!');
      } catch (error) {
        alert('Error downloading CSV: ' + error.message);
      }
    }

    async function clearHistory() {
      if (confirm('⚠️ Are you sure? This will permanently delete all your browsing history from this database.')) {
        try {
          await pageRouter.clearAllPages();
          alert('✅ History cleared successfully!');
          refreshHistory();
        } catch (error) {
          alert('Error clearing history: ' + error.message);
        }
      }
    }

    // Load history on page load
    document.addEventListener('DOMContentLoaded', refreshHistory);

    // Auto-refresh every 30 seconds
    setInterval(refreshHistory, 30000);
  </script>
</body>
</html>
