<script>
const DB_NAME="ANH_v1.0 db";
const STORE="history";

function openDB(){
 return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,1);
  r.onsuccess=()=>res(r.result);
  r.onerror=()=>rej(r.error);
 });
}

async function fetchAll(){
 const db=await openDB();
 return new Promise(res=>{
  const tx=db.transaction(STORE,"readonly");
  const req=tx.objectStore(STORE).getAll();
  req.onsuccess=()=>res(req.result||[]);
 });
}

function format(t){ return new Date(t).toLocaleString(); }

async function render(){
 const data=await fetchAll();
 const body=document.getElementById("historyBody");
 const stats=document.getElementById("statsBody");
 body.innerHTML=""; stats.innerHTML="";
 
 data.sort((a,b)=>b.timestamp-a.timestamp);

 data.forEach(d=>{
  body.innerHTML+=`
  <tr>
   <td>${d.title}</td>
   <td>${d.url}</td>
   <td>${format(d.timestamp)}</td>
   <td class="action-bar">
    <i class="bi bi-box-arrow-up-right" onclick="window.open('${d.url}')"></i>
    <i class="bi bi-trash" onclick="deleteItem(${d.id})"></i>
   </td>
  </tr>`;
 });

 const grouped={};
 data.forEach(d=>{
  if(!grouped[d.url]){
   grouped[d.url]={...d,count:0,first:d.timestamp,last:d.timestamp};
  }
  grouped[d.url].count++;
  grouped[d.url].first=Math.min(grouped[d.url].first,d.timestamp);
  grouped[d.url].last=Math.max(grouped[d.url].last,d.timestamp);
 });

 Object.values(grouped)
 .sort((a,b)=>b.count-a.count)
 .forEach(g=>{
  stats.innerHTML+=`
  <tr>
   <td>${g.title}</td>
   <td>${g.url}</td>
   <td>${g.count}</td>
   <td>${format(g.first)}</td>
   <td>${format(g.last)}</td>
  </tr>`;
 });
}

async function deleteItem(id){
 const db=await openDB();
 const tx=db.transaction(STORE,"readwrite");
 tx.objectStore(STORE).delete(id);
 tx.oncomplete=render;
}

async function clearAll(){
 if(!confirm("Clear all data?")) return;
 const db=await openDB();
 const tx=db.transaction(STORE,"readwrite");
 tx.objectStore(STORE).clear();
 tx.oncomplete=render;
}

async function truncateData(){
 const data=await fetchAll();
 const cutoff=Date.now()-7*24*60*60*1000;
 const db=await openDB();
 const tx=db.transaction(STORE,"readwrite");
 data.forEach(d=>{
  if(d.timestamp<cutoff) tx.objectStore(STORE).delete(d.id);
 });
 tx.oncomplete=render;
}

async function exportData(){
 const data=await fetchAll();
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="anh-history.json";
 a.click();
}

function importData(){
 const input=document.createElement("input");
 input.type="file";
 input.onchange=async e=>{
  const file=e.target.files[0];
  const text=await file.text();
  const data=JSON.parse(text);
  const db=await openDB();
  const tx=db.transaction(STORE,"readwrite");
  data.forEach(d=>tx.objectStore(STORE).add(d));
  tx.oncomplete=render;
 };
 input.click();
}

document.getElementById("swapLogo").onclick=()=>{
 document.getElementById("sidebar").classList.toggle("collapsed");
};

window.onload=render;
</script>
